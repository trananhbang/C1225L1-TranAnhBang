<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bài 1</title>
</head>
<body>

<h2>Tính trung bình các số chia hết cho 3</h2>

<button onclick="nhapMang()">Nhập mảng</button>

<p id="mang"></p>
<p id="ketqua"></p>

<script>

    function nhapMang(){

        let n = parseInt(prompt("Nhập số phần tử của mảng (<=50)"));

        if(n <= 0 || n > 50){
            alert("Số phần tử phải từ 1 đến 50");
            return;
        }

        let arr = [];

        for(let i = 0; i < n; i++){
            arr[i] = parseInt(prompt("Nhập phần tử thứ " + (i+1)));
        }

        document.getElementById("mang").innerHTML =
            "Mảng: " + arr.join(", ");

        let tong = 0;
        let dem = 0;

        for(let i = 0; i < arr.length; i++){
            if(arr[i] % 3 === 0){
                tong += arr[i];
                dem++;
            }
        }

        if(dem === 0){
            document.getElementById("ketqua").innerHTML =
                "Không có số chia hết cho 3";
        }
        else{
            let tb = tong / dem;
            document.getElementById("ketqua").innerHTML =
                "Các số chia hết cho 3 là: " + tb;
        }

    }

</script>

</body>
</html>
