<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bài 2</title>
</head>

<body>

<h2>Kiểm tra số hoàn hảo</h2>

<button onclick="kiemTra()">Nhập số</button>

<p id="ketqua"></p>

<script>

    function kiemTra(){

        let n = parseInt(prompt("Nhập số nguyên dương"));

        let tong = 0;

        for(let i = 1; i < n; i++){
            if(n % i === 0){
                tong += i;
            }
        }

        if(tong === n){
            document.getElementById("ketqua").innerHTML =
                "Đây là số hoàn hảo";
        }
        else{
            document.getElementById("ketqua").innerHTML =
                "Không phải số hoàn hảo";
        }

    }

</script>

</body>
</html>
